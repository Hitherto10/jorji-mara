<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="logo_icon.png" />
    <title>Jorji Mara</title>
    <style>
        /* Custom Font Declaration */
        @font-face {
            font-family: 'TAN-Pearl';
            src: url('assets/font/TAN-Pearl-Regular.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }

        /* Base Styles */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: #4D0010;
            overflow: hidden;
        }

        /* Background using your local image */
        .wrapper {
            height: 100vh;
            width: 100%;
            background-image: url('assets/images/background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* Typography & Layout */
        .brand-header {
            font-size: 14px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            font-weight: 500;
            margin-bottom: 3rem;
            opacity: 0.9;
        }

        .hero-text {
            font-family: 'TAN-Pearl', serif;
            font-size: clamp(3.5rem, 10vw, 6.5rem);
            line-height: 1;
            margin: 0;
            font-weight: normal;
            /* Subtle shadow to ensure readability against the silk background */
            text-shadow: 0 2px 4px rgba(0,0,0,0.02);
        }

        .status-msg {
            margin-top: 2rem;
            font-size: 1.1rem;
            letter-spacing: 0.05em;
            line-height: 1.5;
            font-weight: 300;
        }

        .status-msg strong {
            font-weight: 600;
            letter-spacing: 0.1em;
        }

        .btn-stay-tuned {
            margin-top: 2.5rem;
            padding: 14px 40px;
            background-color: #fff;
            border: none;
            border-radius: 30px;
            color: #4D0010;
            text-transform: uppercase;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.2em;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }

        .btn-stay-tuned:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.08);
        }

        /* Social Icons Section */
        .socials {
            margin-top: 4rem;
            display: flex;
            gap: 20px;
        }

        .socials svg {
            width: 22px;
            height: 22px;
            fill: #4D0010;
            transition: opacity 0.3s;
        }

        .socials a:hover svg {
            opacity: 0.7;
        }
    </style>
</head>
